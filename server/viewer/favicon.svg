<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect x="0" y="0" width="128" height="128" fill="#2E3440" rx="19" />
  <g transform="scale(1.28)">
    <!-- Safe Lanes -->
    <rect x="10" y="10" width="80" height="10" fill="#4C566A" />
    <rect x="10" y="45" width="80" height="10" fill="#4C566A" />
    <rect x="10" y="80" width="80" height="10" fill="#4C566A" />

    <!-- Road Lanes -->
    <rect x="10" y="20" width="80" height="25" fill="#3B4252" />
    <rect x="10" y="55" width="80" height="25" fill="#3B4252" />

    <!-- Lane Dividers -->
    <line x1="10" y1="28.3" x2="90" y2="28.3" stroke="#D8DEE9" stroke-width="0.75" stroke-dasharray="2,2" />
    <line x1="10" y1="36.6" x2="90" y2="36.6" stroke="#D8DEE9" stroke-width="0.75" stroke-dasharray="2,2" />
    <line x1="10" y1="63.3" x2="90" y2="63.3" stroke="#D8DEE9" stroke-width="0.75" stroke-dasharray="2,2" />
    <line x1="10" y1="71.6" x2="90" y2="71.6" stroke="#D8DEE9" stroke-width="0.75" stroke-dasharray="2,2" />

    <!-- Obstacles (Cars) -->
    <rect x="20" y="73" width="15" height="5" rx="1" fill="#EBCB8B" />
    <rect x="60" y="65" width="15" height="5" rx="1" fill="#D08770" />
    <rect x="30" y="57" width="20" height="5" rx="1" fill="#BF616A" />
    <rect x="15" y="38" width="20" height="5" rx="1" fill="#BF616A" />
    <rect x="55" y="30" width="15" height="5" rx="1" fill="#B48EAD" />
    <rect x="35" y="22" width="15" height="5" rx="1" fill="#EBCB8B" />

    <!-- Frog -->
    <circle cx="50" cy="85" r="4" fill="#A3BE8C" />
  </g>
</svg>
